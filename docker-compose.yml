version: '3.8'

services:
  app:
    build: .
    container_name: flowith-api
    ports:
      - "8000:8000"
    environment:
      - STORAGE_BACKEND=postgres
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/flowith
    depends_on:
      - db
    volumes:
      - ./data:/app/data
    networks:
      - flowith-network

  db:
    image: postgres:16-alpine
    container_name: flowith-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=flowith
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flowith-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  flowith-network:
    driver: bridge
